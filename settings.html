<!-- FREQ · TERMINAL 配置面板 -->
<div class="freq-settings-wrap">

  <!-- ═══ 总标题（可折叠） ═══ -->
  <div class="freq-settings-master-header" id="freq-settings-master-toggle">
    <span class="freq-settings-logo">📻</span>
    <span class="freq-settings-title">FREQ · TERMINAL</span>
    <span class="freq-settings-ver">v2.0</span>
    <span class="freq-settings-master-arrow">▼</span>
  </div>

  <!-- ═══ 可折叠主体 ═══ -->
  <div class="freq-settings-body" id="freq-settings-body">

    <!--═══ 标题（保留原样式，但移到内部） ═══ -->
    <div class="freq-settings-header">
      <span style="font-size: 13px; color: #999;">插件设置</span>
    </div>

    <!-- ═══ 区域0：插件控制 ═══ -->
    <div class="freq-settings-section">
      <div class="freq-settings-section-title" data-freq-toggle="freq-sec-master">
        <span>⚡ 插件控制</span>
        <span class="freq-settings-arrow">▼</span>
      </div>
      <div class="freq-settings-section-body" id="freq-sec-master">

        <div class="freq-settings-row">
          <label class="freq-settings-label">启用插件</label>
          <label class="freq-settings-switch">
            <input type="checkbox" id="freq-master-enabled" checked />
            <span class="freq-settings-switch-slider"></span>
          </label>
        </div>

        <div class="freq-settings-row">
          <label class="freq-settings-label">显示悬浮窗</label>
          <label class="freq-settings-switch">
            <input type="checkbox" id="freq-fab-enabled" checked />
            <span class="freq-settings-switch-slider"></span>
          </label>
        </div>

        <div class="freq-settings-row">
          <button class="freq-settings-btn freq-settings-btn-primary" id="freq-open-phone-btn">📱 打开手机</button>
        </div>

      </div>
    </div>

    <!-- ═══ 区域1：副API 配置 ═══ -->
    <div class="freq-settings-section">
      <div class="freq-settings-section-title" data-freq-toggle="freq-sec-api">
        <span>🔑 副API 配置</span>
        <span class="freq-settings-arrow">▼</span>
      </div>
      <div class="freq-settings-section-body" id="freq-sec-api">

        <div class="freq-settings-row">
          <label class="freq-settings-label">API Base URL</label>
          <input type="text" class="freq-settings-input" id="freq-api-url"
                 placeholder="https://api.openai.com/v1" />
        </div>

        <div class="freq-settings-row">
          <label class="freq-settings-label">API Key</label>
          <div class="freq-settings-input-group">
            <input type="password" class="freq-settings-input" id="freq-api-key"
                   placeholder="sk-..." />
            <button class="freq-settings-btn freq-settings-btn-sm" id="freq-api-toggle-key"
                    title="显示/隐藏">👁</button>
          </div>
        </div>

        <div class="freq-settings-row">
          <button class="freq-settings-btn freq-settings-btn-primary" id="freq-api-fetch-models">🔍 获取可用模型</button>
          <span class="freq-settings-hint" id="freq-api-status"></span>
        </div>

        <div class="freq-settings-row">
          <label class="freq-settings-label">选择模型</label>
          <select class="freq-settings-select" id="freq-api-model" disabled>
            <option value="">-- 请先获取模型列表 --</option>
          </select>
        </div>

        <div class="freq-settings-row">
          <label class="freq-settings-label">Temperature</label>
          <input type="range" class="freq-settings-range" id="freq-api-temp"
                 min="0" max="2" step="0.1" value="0.8" />
          <span class="freq-settings-range-val" id="freq-api-temp-val">0.8</span>
        </div>

        <div class="freq-settings-row">
          <label class="freq-settings-label">Max Tokens</label>
          <input type="number" class="freq-settings-input freq-settings-input-sm"
                 id="freq-api-max-tokens" value="1024" min="128" max="8192" step="128" />
        </div>

      </div>
    </div>

    <!-- ═══ 区域2：后台触发设置 ═══ -->
    <div class="freq-settings-section">
      <div class="freq-settings-section-title" data-freq-toggle="freq-sec-trigger">
        <span>⏰ 后台触发设置</span>
        <span class="freq-settings-arrow">▼</span>
      </div>
      <div class="freq-settings-section-body" id="freq-sec-trigger">

        <div class="freq-settings-row">
          <label class="freq-settings-label">启用后台触发</label>
          <label class="freq-settings-switch">
            <input type="checkbox" id="freq-trigger-enabled" />
            <span class="freq-settings-switch-slider"></span>
          </label>
        </div>

        <div class="freq-settings-row">
          <label class="freq-settings-label">触发间隔</label>
          <select class="freq-settings-select" id="freq-trigger-interval">
            <option value="1800000">30 分钟</option>
            <option value="3600000" selected>1 小时</option>
            <option value="0">自定义</option>
          </select>
        </div>

        <div class="freq-settings-row freq-settings-row-hidden" id="freq-trigger-custom-row">
          <label class="freq-settings-label">自定义（分钟）</label>
          <input type="number" class="freq-settings-input freq-settings-input-sm"
                 id="freq-trigger-custom" value="45" min="10" max="480" />
        </div>

        <div class="freq-settings-row">
          <label class="freq-settings-label">静默期（小时）</label>
          <input type="number" class="freq-settings-input freq-settings-input-sm"
                 id="freq-trigger-cooldown" value="3" min="1" max="12" />
        </div>

        <div class="freq-settings-row freq-settings-row-col">
          <label class="freq-settings-label">参与后台触发的App</label>
          <div class="freq-settings-checkbox-grid" id="freq-trigger-apps"></div>
        </div>

        <div class="freq-settings-row">
          <label class="freq-settings-label">当前状态</label>
          <span class="freq-settings-hint" id="freq-trigger-status">未启用</span>
        </div>

      </div>
    </div>

    <!-- ═══ 区域3：Prompt 自定义 ═══ -->
    <div class="freq-settings-section">
      <div class="freq-settings-section-title" data-freq-toggle="freq-sec-prompts">
        <span>📝 Prompt 自定义</span>
        <span class="freq-settings-arrow">▼</span>
      </div>
      <div class="freq-settings-section-body" id="freq-sec-prompts">

        <div class="freq-settings-row">
          <label class="freq-settings-label">选择 App</label>
          <select class="freq-settings-select" id="freq-prompt-app-select">
            <option value="">-- 选择要编辑的 App --</option>
          </select>
        </div>

        <div class="freq-settings-row freq-settings-row-col" id="freq-prompt-editor-wrap" style="display:none;">
          <label class="freq-settings-label">System Prompt</label>
          <textarea class="freq-settings-textarea" id="freq-prompt-system"
                    rows="6" placeholder="系统提示词..."></textarea>

          <label class="freq-settings-label" style="margin-top:8px;">User Prompt 模板</label>
          <textarea class="freq-settings-textarea" id="freq-prompt-user"
                    rows="4" placeholder="用户提示词模板...可用变量: {{char}}, {{user}}, {{context}}"></textarea>

          <div class="freq-settings-btn-row">
            <button class="freq-settings-btn freq-settings-btn-primary" id="freq-prompt-save">💾 保存</button>
            <button class="freq-settings-btn" id="freq-prompt-reset">🔄 恢复默认</button>
          </div>
        </div>

      </div>
    </div>

    <!-- ═══ 区域4：报错日志 ═══ -->
    <div class="freq-settings-section">
      <div class="freq-settings-section-title" data-freq-toggle="freq-sec-logs">
        <span>🪵 报错日志</span>
        <span class="freq-settings-arrow">▼</span>
      </div>
      <div class="freq-settings-section-body" id="freq-sec-logs">

        <div class="freq-settings-row">
          <select class="freq-settings-select freq-settings-select-sm" id="freq-log-filter">
            <option value="all">全部</option>
            <option value="error">❌ 错误</option>
            <option value="warn">⚠️ 警告</option>
            <option value="info">ℹ️ 信息</option>
          </select>
          <button class="freq-settings-btn freq-settings-btn-sm" id="freq-log-clear">🗑 清空</button>
          <button class="freq-settings-btn freq-settings-btn-sm" id="freq-log-export">📋 导出</button>
        </div>

        <div class="freq-log-list" id="freq-log-list">
          <div class="freq-log-empty">暂无日志</div>
        </div>

      </div>
    </div>

    <!-- ═══ 区域5：关于 ═══ -->
    <div class="freq-settings-section">
      <div class="freq-settings-section-title" data-freq-toggle="freq-sec-about">
        <span>ℹ️ 关于</span>
        <span class="freq-settings-arrow">▼</span>
      </div>
      <div class="freq-settings-section-body" id="freq-sec-about">
        <div class="freq-settings-about">
          <p><strong>FREQ · TERMINAL</strong> v2.0</p>
          <p>「失真电台」专用虚拟手机插件</p>
          <p>为角色扮演增加被动发现感与第四面墙张力</p>
        </div>
      </div>
    </div>

  </div><!-- freq-settings-body END -->

</div>
